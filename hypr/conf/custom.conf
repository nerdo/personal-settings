# Add your additional Hyprland configurations here
#
# This is an additional key binding
# bind = $mainMod CTRL, up, workspace, empty
#
# Example for xwayland
# xwayland {
#   force_zero_scaling = true
# }

# qt5ct environment variable
# env = QT_QPA_PLATFORMTHEME,qt5ct

# SDL version
env = SDL_VIDEODRIVER,wayland
# env = SDL_VIDEODRIVER,x11

# No Hardware Cursor
# cursor {
#     no_hardware_cursors = false
# }

# Blur for waybar (Hyprland 0.53+ syntax)
#layerrule = blur on, match:namespace waybar

# Uncomment in case you have issues with screensharing
# exec-once = ~/.config/hypr/scripts/xdg.sh

# NVIDIA environment
source = ~/.config/hypr/conf/environments/nvidia.conf

# Enable logging for debugging freezes
debug {
    disable_logs = false
}

# Active window highlighting
general {
    border_size = 3
    col.active_border = rgba(ff8c00ff) rgba(ff5500ff) 45deg
    col.inactive_border = $outline_variant
}

decoration {
    dim_inactive = true
    dim_strength = 0.15
}

# Input tuning (was in conf/keyboard.conf before ml4w overwrote it)
input {
    sensitivity = -0.2
    force_no_accel = true
    natural_scroll = true
    repeat_delay = 150
    repeat_rate = 30
}